<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b0f17" />
<title>Traductor Simultaneo</title>
<link rel="manifest" href="translate.webmanifest" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon.svg" />
<style>
  :root {
    --bg: #0b0f17;
    --panel: #131a26;
    --panel-2: #1a2333;
    --border: #233048;
    --text: #e7ecf3;
    --muted: #8a97ad;
    --accent: #4f8cff;
    --accent-2: #7aa7ff;
    --danger: #ff6b6b;
    --ok: #4ade80;
    --rec: #ff4d6d;
    --radius: 14px;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f5f7fb; --panel: #ffffff; --panel-2: #f0f3f8;
      --border: #dde3ee; --text: #1a1f2b; --muted: #5d6878;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font: 16px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  .app { max-width: 720px; margin: 0 auto;
    padding: max(env(safe-area-inset-top), 16px) 16px max(env(safe-area-inset-bottom), 16px); }
  header { display: flex; align-items: center; gap: 12px; padding: 8px 4px 16px; }
  header h1 { font-size: 20px; margin: 0; font-weight: 600; letter-spacing: -0.01em; }
  header .dot { width: 28px; height: 28px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), #b46bff); }
  .nav { margin-left: auto; }
  .nav a { color: var(--muted); text-decoration: none; font-size: 13px; }
  .card { background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; min-width: 0; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px;
    letter-spacing: 0.02em; text-transform: uppercase; }
  input[type="text"], input[type="password"], select {
    width: 100%; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; font: inherit; outline: none; transition: border-color .15s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  .key-row { position: relative; }
  .key-row .toggle {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    background: transparent; border: 0; color: var(--muted); padding: 8px;
    font-size: 13px; cursor: pointer;
  }
  .field + .field { margin-top: 12px; }

  .mic-wrap { display: flex; flex-direction: column; align-items: center; padding: 8px 0 4px; }
  .mic {
    width: 132px; height: 132px; border-radius: 50%;
    background: var(--accent); color: #fff;
    border: 0; cursor: pointer; display: grid; place-items: center;
    box-shadow: 0 12px 32px rgba(79,140,255,0.35);
    transition: transform .08s, background .2s, box-shadow .2s;
  }
  .mic:active { transform: scale(0.97); }
  .mic.active {
    background: var(--rec);
    box-shadow: 0 0 0 0 rgba(255,77,109,0.6);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(255,77,109,0.55); }
    70%  { box-shadow: 0 0 0 22px rgba(255,77,109,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,77,109,0); }
  }
  .mic svg { width: 56px; height: 56px; }
  .mic-label { margin-top: 12px; font-size: 14px; color: var(--muted); }

  .status { font-size: 13px; color: var(--muted); margin: 10px 0; min-height: 18px; text-align: center; }
  .status.error { color: var(--danger); }
  .status.ok { color: var(--ok); }

  .transcript { max-height: 50vh; overflow-y: auto; }
  .turn { padding: 10px 12px; border-radius: 10px; margin-bottom: 8px;
    background: var(--panel-2); border: 1px solid var(--border); }
  .turn.user { opacity: 0.78; }
  .turn .who { font-size: 11px; text-transform: uppercase; color: var(--muted);
    margin-bottom: 4px; letter-spacing: 0.04em; }
  .turn .text { font-size: 15px; line-height: 1.4; white-space: pre-wrap; word-wrap: break-word; }
  .empty { color: var(--muted); font-size: 13px; text-align: center; padding: 12px; }

  details summary { cursor: pointer; color: var(--muted); font-size: 13px;
    padding: 4px 0; list-style: none; }
  details summary::-webkit-details-marker { display: none; }
  .hint { font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.5; }
  .hint a { color: var(--accent-2); }

  .swap-btn {
    margin: 10px auto 0; display: block;
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    border-radius: 999px; padding: 8px 16px; font-size: 13px; cursor: pointer;
  }
  .swap-btn:hover { color: var(--text); border-color: var(--accent); }
  .clear-btn {
    background: transparent; border: 0; color: var(--muted);
    font-size: 12px; cursor: pointer; padding: 4px 8px; float: right;
  }
  .clear-btn:hover { color: var(--text); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="dot"></div>
    <h1>Traductor Simultaneo</h1>
    <div class="nav"><a href="./">TTS &rarr;</a></div>
  </header>

  <div class="card">
    <div class="field">
      <label for="apiKey">API Key</label>
      <div class="key-row">
        <input id="apiKey" type="password" autocomplete="off" placeholder="sk-..." spellcheck="false" />
        <button class="toggle" type="button" id="toggleKey">Ver</button>
      </div>
      <div class="hint">Se guarda solo en tu telefono. Necesita HTTPS para acceder al microfono.</div>
    </div>
  </div>

  <div class="card">
    <div class="field">
      <label for="targetLang">Traducir a (idioma de salida)</label>
      <select id="targetLang"></select>
      <div class="hint">El modelo detecta el idioma original automaticamente. Lo traduce hacia el idioma que elijas aqui.</div>
    </div>
    <button class="swap-btn" id="swapBtn" type="button">&#8646; Alternar con <span id="swapHint">otro idioma</span></button>

    <details style="margin-top: 14px;">
      <summary>Avanzado</summary>
      <div class="field" style="margin-top: 10px;">
        <label for="noise">Reduccion de ruido</label>
        <select id="noise">
          <option value="near_field" selected>near_field (telefono cerca)</option>
          <option value="far_field">far_field (microfono lejano)</option>
          <option value="off">desactivada</option>
        </select>
      </div>
    </details>
  </div>

  <div class="mic-wrap">
    <button id="micBtn" class="mic" type="button" aria-label="Iniciar/Detener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="3" width="6" height="12" rx="3"/>
        <path d="M5 11a7 7 0 0 0 14 0"/>
        <line x1="12" y1="18" x2="12" y2="22"/>
      </svg>
    </button>
    <div class="mic-label" id="micLabel">Toca para iniciar</div>
  </div>

  <div id="status" class="status">Listo</div>

  <div class="card transcript" id="transcript">
    <button class="clear-btn" id="clearBtn" type="button">Limpiar</button>
    <div class="empty" id="emptyMsg">El historial de la traduccion aparecera aqui.</div>
  </div>
</div>

<audio id="remoteAudio" autoplay playsinline></audio>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const apiKeyEl = $("apiKey");
  const toggleKeyEl = $("toggleKey");
  const targetLangEl = $("targetLang");
  const swapBtn = $("swapBtn");
  const swapHint = $("swapHint");
  const noiseEl = $("noise");
  const micBtn = $("micBtn");
  const micLabel = $("micLabel");
  const statusEl = $("status");
  const transcriptEl = $("transcript");
  const emptyMsg = $("emptyMsg");
  const clearBtn = $("clearBtn");
  const remoteAudio = $("remoteAudio");

  // ISO 639-1 codes. gpt-realtime-translate accepts standard language codes.
  const LANGS = [
    ["es", "Espanol"],
    ["en", "Ingles"],
    ["fr", "Frances"],
    ["de", "Aleman"],
    ["it", "Italiano"],
    ["pt", "Portugues"],
    ["ca", "Catalan"],
    ["nl", "Holandes"],
    ["ru", "Ruso"],
    ["pl", "Polaco"],
    ["tr", "Turco"],
    ["ar", "Arabe"],
    ["hi", "Hindi"],
    ["ja", "Japones"],
    ["ko", "Coreano"],
    ["zh", "Chino mandarin"],
    ["vi", "Vietnamita"],
    ["th", "Tailandes"],
    ["id", "Indonesio"],
    ["el", "Griego"],
    ["he", "Hebreo"],
    ["sv", "Sueco"],
    ["no", "Noruego"],
    ["da", "Danes"],
    ["fi", "Finlandes"],
    ["cs", "Checo"],
    ["ro", "Rumano"],
    ["uk", "Ucraniano"],
  ];
  const LANG_LABEL = Object.fromEntries(LANGS);
  for (const [code, label] of LANGS) {
    const opt = document.createElement("option");
    opt.value = code; opt.textContent = label;
    targetLangEl.appendChild(opt);
  }

  const STORE = {
    apiKey: "tts.apiKey",
    target: "rt2.target",
    prev: "rt2.prev",
    noise: "rt2.noise",
  };
  apiKeyEl.value = localStorage.getItem(STORE.apiKey) || "";
  targetLangEl.value = localStorage.getItem(STORE.target) || "en";
  let prevLang = localStorage.getItem(STORE.prev) || (targetLangEl.value === "es" ? "en" : "es");
  noiseEl.value = localStorage.getItem(STORE.noise) || "near_field";

  apiKeyEl.addEventListener("input", () => localStorage.setItem(STORE.apiKey, apiKeyEl.value));
  noiseEl.addEventListener("change", () => localStorage.setItem(STORE.noise, noiseEl.value));
  targetLangEl.addEventListener("change", () => {
    if (targetLangEl.value !== prevLang) {
      prevLang = localStorage.getItem(STORE.target) || prevLang;
    }
    localStorage.setItem(STORE.target, targetLangEl.value);
    localStorage.setItem(STORE.prev, prevLang);
    updateSwapHint();
    if (running) restart();
  });

  function updateSwapHint() {
    swapHint.textContent = LANG_LABEL[prevLang] || prevLang;
  }
  updateSwapHint();

  swapBtn.addEventListener("click", () => {
    const curr = targetLangEl.value;
    targetLangEl.value = prevLang;
    prevLang = curr;
    localStorage.setItem(STORE.target, targetLangEl.value);
    localStorage.setItem(STORE.prev, prevLang);
    updateSwapHint();
    if (running) restart();
  });

  toggleKeyEl.addEventListener("click", () => {
    const showing = apiKeyEl.type === "text";
    apiKeyEl.type = showing ? "password" : "text";
    toggleKeyEl.textContent = showing ? "Ver" : "Ocultar";
  });

  function setStatus(msg, kind) {
    statusEl.textContent = msg || "";
    statusEl.className = "status" + (kind ? " " + kind : "");
  }

  // Transcript
  let emptyShown = true;
  const ensureNotEmpty = () => {
    if (emptyShown) { emptyMsg.style.display = "none"; emptyShown = false; }
  };
  const turnsByItem = new Map();
  function turnDiv(who) {
    const div = document.createElement("div");
    div.className = "turn " + who;
    div.innerHTML = '<div class="who">' + (who === "user" ? "Origen" : "Traduccion") + '</div><div class="text"></div>';
    transcriptEl.appendChild(div);
    transcriptEl.scrollTop = transcriptEl.scrollHeight;
    return div;
  }
  function appendDelta(who, delta, itemId) {
    if (!delta) return;
    ensureNotEmpty();
    const key = who + ":" + (itemId || "current");
    let div = turnsByItem.get(key);
    if (!div) {
      div = turnDiv(who);
      turnsByItem.set(key, div);
    }
    const t = div.querySelector(".text");
    t.textContent = (t.textContent || "") + delta;
    transcriptEl.scrollTop = transcriptEl.scrollHeight;
  }
  clearBtn.addEventListener("click", () => {
    turnsByItem.clear();
    transcriptEl.querySelectorAll(".turn").forEach(n => n.remove());
    emptyMsg.style.display = "";
    emptyShown = true;
  });

  // Realtime translation session
  let pc = null, dc = null, micStream = null, running = false, starting = false;

  async function start() {
    if (starting || running) return;
    starting = true;
    const apiKey = apiKeyEl.value.trim();
    if (!apiKey) { setStatus("Falta la API key.", "error"); apiKeyEl.focus(); starting = false; return; }
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      setStatus("Tu navegador no permite microfono. Abre la pagina con HTTPS.", "error");
      starting = false; return;
    }

    const targetLang = targetLangEl.value;
    setStatus("Creando sesion de traduccion...");
    micBtn.disabled = true;

    const sessionConfig = {
      model: "gpt-realtime-translate",
      audio: {
        input: {
          transcription: { model: "gpt-realtime-whisper" },
        },
        output: { language: targetLang },
      },
    };
    if (noiseEl.value !== "off") {
      sessionConfig.audio.input.noise_reduction = { type: noiseEl.value };
    }

    let clientSecret;
    try {
      const res = await fetch("https://api.openai.com/v1/realtime/translations/client_secrets", {
        method: "POST",
        headers: { "Authorization": "Bearer " + apiKey, "Content-Type": "application/json" },
        body: JSON.stringify({ session: sessionConfig }),
      });
      if (!res.ok) {
        const t = await res.text();
        setStatus("Error sesion (" + res.status + "): " + t, "error");
        micBtn.disabled = false; starting = false; return;
      }
      const data = await res.json();
      clientSecret = (data.client_secret && data.client_secret.value) || data.value || data.client_secret;
      if (!clientSecret || typeof clientSecret !== "string") {
        setStatus("Respuesta sin client_secret.", "error");
        micBtn.disabled = false; starting = false; return;
      }
    } catch (e) {
      setStatus("Fallo de red al crear sesion: " + e.message, "error");
      micBtn.disabled = false; starting = false; return;
    }

    try {
      micStream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
      });
    } catch (e) {
      setStatus("Permiso de microfono denegado.", "error");
      micBtn.disabled = false; starting = false; return;
    }

    pc = new RTCPeerConnection();
    pc.ontrack = (e) => { remoteAudio.srcObject = e.streams[0]; };
    pc.addTrack(micStream.getAudioTracks()[0], micStream);

    dc = pc.createDataChannel("oai-events");
    dc.addEventListener("open", () => {
      running = true; starting = false;
      micBtn.classList.add("active");
      micBtn.disabled = false;
      targetLangEl.disabled = false;
      micLabel.textContent = "Escuchando... toca para parar";
      setStatus("En vivo - traduciendo a " + (LANG_LABEL[targetLang] || targetLang), "ok");
    });
    dc.addEventListener("message", (e) => {
      let ev; try { ev = JSON.parse(e.data); } catch { return; }
      handleEvent(ev);
    });
    dc.addEventListener("close", () => { if (running) stop(); });

    try {
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      const sdpRes = await fetch("https://api.openai.com/v1/realtime/translations/calls", {
        method: "POST",
        headers: { "Authorization": "Bearer " + clientSecret, "Content-Type": "application/sdp" },
        body: offer.sdp,
      });
      if (!sdpRes.ok) {
        const t = await sdpRes.text();
        setStatus("Error SDP (" + sdpRes.status + "): " + t, "error");
        stop(); return;
      }
      const answerSdp = await sdpRes.text();
      await pc.setRemoteDescription({ type: "answer", sdp: answerSdp });
      try { await remoteAudio.play(); } catch {}
    } catch (e) {
      setStatus("Fallo en la conexion: " + e.message, "error");
      stop();
    }
  }

  function stop() {
    running = false; starting = false;
    micBtn.classList.remove("active");
    micBtn.disabled = false;
    micLabel.textContent = "Toca para iniciar";
    if (dc) { try { dc.close(); } catch {} dc = null; }
    if (pc) { try { pc.close(); } catch {} pc = null; }
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    remoteAudio.srcObject = null;
    // Reset transcript grouping so the next session starts fresh turns.
    turnsByItem.clear();
    setStatus("Detenido");
  }

  async function restart() {
    if (!running) return;
    stop();
    await new Promise(r => setTimeout(r, 200));
    await start();
  }

  function handleEvent(ev) {
    if (!ev || !ev.type) return;
    switch (ev.type) {
      case "session.input_transcript.delta":
        appendDelta("user", ev.delta, ev.item_id || "in-current");
        break;
      case "session.input_transcript.done":
        // Finalize current input bucket so next phrase opens a new one.
        if (ev.item_id) turnsByItem.delete("user:" + ev.item_id);
        else turnsByItem.delete("user:in-current");
        break;
      case "session.output_transcript.delta":
        appendDelta("ai", ev.delta, ev.item_id || "out-current");
        break;
      case "session.output_transcript.done":
        if (ev.item_id) turnsByItem.delete("ai:" + ev.item_id);
        else turnsByItem.delete("ai:out-current");
        break;
      case "session.closed":
        stop();
        break;
      case "error":
        setStatus("Error: " + (ev.error && ev.error.message ? ev.error.message : JSON.stringify(ev.error)), "error");
        break;
    }
  }

  micBtn.addEventListener("click", () => { running ? stop() : start(); });
  window.addEventListener("beforeunload", () => { if (running) stop(); });
})();
</script>
</body>
</html>
