<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b0f17" />
<title>OpenAI TTS</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon.svg" />
<style>
  :root {
    --bg: #0b0f17;
    --panel: #131a26;
    --panel-2: #1a2333;
    --border: #233048;
    --text: #e7ecf3;
    --muted: #8a97ad;
    --accent: #4f8cff;
    --accent-2: #7aa7ff;
    --danger: #ff6b6b;
    --ok: #4ade80;
    --radius: 14px;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --panel-2: #f0f3f8;
      --border: #dde3ee;
      --text: #1a1f2b;
      --muted: #5d6878;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font: 16px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  .app {
    max-width: 720px;
    margin: 0 auto;
    padding: max(env(safe-area-inset-top), 16px) 16px max(env(safe-area-inset-bottom), 16px);
  }
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 4px 16px;
  }
  header h1 {
    font-size: 20px; margin: 0; font-weight: 600; letter-spacing: -0.01em;
  }
  header .dot {
    width: 28px; height: 28px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), #b46bff);
  }
  .nav { margin-left: auto; }
  .nav a { color: var(--muted); text-decoration: none; font-size: 13px; }
  .nav a:hover { color: var(--text); }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 14px;
  }
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; min-width: 0; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.02em; text-transform: uppercase; }
  input[type="text"], input[type="password"], textarea, select {
    width: 100%;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font: inherit;
    outline: none;
    transition: border-color .15s;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { min-height: 140px; resize: vertical; }
  .key-row { position: relative; }
  .key-row .toggle {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    background: transparent; border: 0; color: var(--muted); padding: 8px;
    font-size: 13px; cursor: pointer;
  }
  .field + .field { margin-top: 12px; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%;
    background: var(--accent); color: #fff;
    border: 0; border-radius: 12px;
    padding: 14px 16px; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: background .15s, transform .05s;
  }
  .btn:hover { background: var(--accent-2); }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { opacity: 0.55; cursor: not-allowed; }
  .btn.secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }
  .btn.secondary:hover { background: var(--panel); }
  .actions { display: flex; gap: 10px; }
  .speed { display: flex; align-items: center; gap: 12px; }
  .speed input[type="range"] { flex: 1; }
  .speed .val { font-variant-numeric: tabular-nums; color: var(--muted); min-width: 42px; text-align: right; }
  audio { width: 100%; margin-top: 12px; }
  .status {
    font-size: 13px; color: var(--muted); margin-top: 10px; min-height: 18px;
  }
  .status.error { color: var(--danger); }
  .status.ok { color: var(--ok); }
  details { margin-top: 4px; }
  details summary {
    cursor: pointer; color: var(--muted); font-size: 13px; padding: 4px 0;
    list-style: none;
  }
  details summary::-webkit-details-marker { display: none; }
  details[open] summary { color: var(--text); }
  .hint { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.5; }
  .hint a { color: var(--accent-2); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="dot"></div>
    <h1>OpenAI Text-to-Speech</h1>
    <div class="nav"><a href="translate.html">Traductor en vivo &rarr;</a></div>
  </header>

  <div class="card">
    <div class="field">
      <label for="apiKey">API Key</label>
      <div class="key-row">
        <input id="apiKey" type="password" autocomplete="off" placeholder="sk-..." spellcheck="false" />
        <button class="toggle" type="button" id="toggleKey" aria-label="Mostrar/ocultar">Ver</button>
      </div>
      <div class="hint">Se guarda solo en tu telefono (localStorage). No se envia a ningun servidor que no sea OpenAI.</div>
    </div>
  </div>

  <div class="card">
    <div class="field">
      <label for="text">Texto</label>
      <textarea id="text" placeholder="Escribe lo que quieres que la voz diga..."></textarea>
    </div>

    <div class="field row">
      <div>
        <label for="model">Modelo</label>
        <select id="model">
          <option value="gpt-4o-mini-tts" selected>gpt-4o-mini-tts (nuevo)</option>
          <option value="tts-1-hd">tts-1-hd</option>
          <option value="tts-1">tts-1</option>
        </select>
      </div>
      <div>
        <label for="voice">Voz</label>
        <select id="voice">
          <option value="alloy">alloy</option>
          <option value="ash">ash</option>
          <option value="ballad">ballad</option>
          <option value="coral" selected>coral</option>
          <option value="echo">echo</option>
          <option value="fable">fable</option>
          <option value="nova">nova</option>
          <option value="onyx">onyx</option>
          <option value="sage">sage</option>
          <option value="shimmer">shimmer</option>
          <option value="verse">verse</option>
        </select>
      </div>
    </div>

    <div class="field" id="instrField">
      <label for="instructions">Instrucciones de estilo (opcional, solo gpt-4o-mini-tts)</label>
      <input id="instructions" type="text" placeholder='ej: "habla con tono alegre y rapido"' />
    </div>

    <div class="field">
      <label for="speed">Velocidad <span id="speedVal" class="val">1.00</span></label>
      <div class="speed">
        <input id="speed" type="range" min="0.25" max="4" step="0.05" value="1" />
      </div>
    </div>

    <details>
      <summary>Opciones avanzadas</summary>
      <div class="field" style="margin-top: 10px;">
        <label for="format">Formato</label>
        <select id="format">
          <option value="mp3" selected>mp3</option>
          <option value="opus">opus</option>
          <option value="aac">aac</option>
          <option value="flac">flac</option>
          <option value="wav">wav</option>
        </select>
      </div>
    </details>
  </div>

  <div class="actions">
    <button class="btn" id="speakBtn" type="button">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <span>Reproducir</span>
    </button>
    <button class="btn secondary" id="downloadBtn" type="button" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span>Descargar</span>
    </button>
  </div>

  <div id="status" class="status"></div>
  <audio id="player" controls></audio>
</div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const apiKeyEl = $("apiKey");
  const toggleKeyEl = $("toggleKey");
  const textEl = $("text");
  const modelEl = $("model");
  const voiceEl = $("voice");
  const instrEl = $("instructions");
  const instrField = $("instrField");
  const speedEl = $("speed");
  const speedValEl = $("speedVal");
  const formatEl = $("format");
  const speakBtn = $("speakBtn");
  const downloadBtn = $("downloadBtn");
  const statusEl = $("status");
  const player = $("player");

  const STORE = {
    apiKey: "tts.apiKey",
    text: "tts.text",
    model: "tts.model",
    voice: "tts.voice",
    instructions: "tts.instructions",
    speed: "tts.speed",
    format: "tts.format",
  };

  // Restore
  const load = (k, el, def) => {
    const v = localStorage.getItem(k);
    if (v !== null) el.value = v;
    else if (def !== undefined) el.value = def;
  };
  load(STORE.apiKey, apiKeyEl);
  load(STORE.text, textEl);
  load(STORE.model, modelEl);
  load(STORE.voice, voiceEl);
  load(STORE.instructions, instrEl);
  load(STORE.speed, speedEl);
  load(STORE.format, formatEl);
  speedValEl.textContent = parseFloat(speedEl.value).toFixed(2);
  updateInstrVisibility();

  const persist = (k, el) => el.addEventListener("input", () => localStorage.setItem(k, el.value));
  persist(STORE.apiKey, apiKeyEl);
  persist(STORE.text, textEl);
  persist(STORE.instructions, instrEl);
  persist(STORE.speed, speedEl);
  [modelEl, voiceEl, formatEl].forEach(el => {
    el.addEventListener("change", () => localStorage.setItem("tts." + el.id, el.value));
  });

  speedEl.addEventListener("input", () => {
    speedValEl.textContent = parseFloat(speedEl.value).toFixed(2);
  });

  modelEl.addEventListener("change", updateInstrVisibility);
  function updateInstrVisibility() {
    instrField.style.display = modelEl.value === "gpt-4o-mini-tts" ? "" : "none";
  }

  toggleKeyEl.addEventListener("click", () => {
    const showing = apiKeyEl.type === "text";
    apiKeyEl.type = showing ? "password" : "text";
    toggleKeyEl.textContent = showing ? "Ver" : "Ocultar";
  });

  let lastBlobUrl = null;
  let lastBlob = null;
  let lastExt = "mp3";

  function setStatus(msg, kind) {
    statusEl.textContent = msg || "";
    statusEl.className = "status" + (kind ? " " + kind : "");
  }

  async function speak() {
    const key = apiKeyEl.value.trim();
    const text = textEl.value.trim();
    if (!key) { setStatus("Falta la API key.", "error"); apiKeyEl.focus(); return; }
    if (!text) { setStatus("Escribe el texto a reproducir.", "error"); textEl.focus(); return; }

    const body = {
      model: modelEl.value,
      input: text,
      voice: voiceEl.value,
      response_format: formatEl.value,
      speed: parseFloat(speedEl.value),
    };
    if (modelEl.value === "gpt-4o-mini-tts" && instrEl.value.trim()) {
      body.instructions = instrEl.value.trim();
    }

    speakBtn.disabled = true;
    downloadBtn.disabled = true;
    setStatus("Generando audio...");

    try {
      const res = await fetch("https://api.openai.com/v1/audio/speech", {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + key,
          "Content-Type": "application/json",
        },
        body: JSON.stringify(body),
      });

      if (!res.ok) {
        let msg = "Error " + res.status;
        try {
          const j = await res.json();
          if (j && j.error && j.error.message) msg += ": " + j.error.message;
        } catch {
          try { msg += ": " + (await res.text()); } catch {}
        }
        setStatus(msg, "error");
        return;
      }

      const blob = await res.blob();
      if (lastBlobUrl) URL.revokeObjectURL(lastBlobUrl);
      lastBlobUrl = URL.createObjectURL(blob);
      lastBlob = blob;
      lastExt = formatEl.value;
      player.src = lastBlobUrl;
      try { await player.play(); } catch {}
      downloadBtn.disabled = false;
      setStatus("Listo", "ok");
    } catch (err) {
      setStatus("Fallo de red: " + (err && err.message ? err.message : err), "error");
    } finally {
      speakBtn.disabled = false;
    }
  }

  speakBtn.addEventListener("click", speak);

  downloadBtn.addEventListener("click", () => {
    if (!lastBlob) return;
    const a = document.createElement("a");
    const ts = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
    a.href = lastBlobUrl;
    a.download = `tts-${voiceEl.value}-${ts}.${lastExt}`;
    document.body.appendChild(a);
    a.click();
    a.remove();
  });

  // Ctrl/Cmd+Enter para reproducir desde el textarea
  textEl.addEventListener("keydown", (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
      e.preventDefault();
      speak();
    }
  });
})();
</script>
</body>
</html>
